name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]" build ruff black
          
      - name: Lint (black & ruff)
        run: |
          black --check src/dimcause tests/ || echo "Formatting issues found"
          ruff check src/dimcause tests/ || echo "Lint issues found"
        continue-on-error: true
        
      - name: Type check (mypy)
        run: mypy src/dimcause --ignore-missing-imports || echo "Type issues found"
        continue-on-error: true

      - name: Run tests (pytest)
        run: pytest tests/ --cov=src/dimcause --cov-report=xml --cov-report=term -v

      - name: Build package
        run: python -m build
